<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraAmbient-Bass | Generative Audio</title>
    <!-- Tone.js for Web Audio Synthesis -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root {
            --bg-color: #0b0f19;
            --panel-bg: rgba(255, 255, 255, 0.05);
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at center, #1e1b4b 0%, var(--bg-color) 100%);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 600px;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            padding: 2rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .status-panel {
            background: rgba(0,0,0,0.3);
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            text-align: left;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .control-group label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            margin-top: -6px;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }

        select {
            width: 100%;
            padding: 0.8rem;
            background: rgba(0,0,0,0.3);
            color: var(--text-main);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            cursor: pointer;
        }

        .play-btn {
            margin-top: 2rem;
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--text-main);
            padding: 1rem 3rem;
            font-size: 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .play-btn:hover {
            background: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .play-btn.active {
            background: var(--accent);
            box-shadow: 0 0 30px var(--accent-glow);
            border-color: transparent;
        }

        /* Aura Visualizer Effect */
        .aura-visualizer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            opacity: 0;
            z-index: 0;
            pointer-events: none;
            transition: opacity 2s ease;
        }

        .aura-visualizer.playing {
            opacity: 0.4;
            animation: pulse 8s infinite alternate ease-in-out;
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.2; }
            100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0.6; }
        }
    </style>
</head>
<body>

    <div class="aura-visualizer" id="aura"></div>

    <div class="container">
        <h1>AuraAmbient-Bass</h1>
        <p class="subtitle">Generative Audio & Smart Environmental Adaptation</p>

        <div class="status-panel">
            <div id="timeDisplay">Time: --:--</div>
            <div id="vibeDisplay">Vibe: Detecting...</div>
        </div>

        <div class="controls">
            <!-- Mood Input -->
            <div class="control-group">
                <label for="moodSelect">Mood</label>
                <select id="moodSelect">
                    <option value="calm">Calm & Relaxed</option>
                    <option value="focus">Deep Focus</option>
                    <option value="energetic">Energetic Pulse</option>
                    <option value="sleep">Deep Sleep (Sub-bass)</option>
                </select>
            </div>

            <!-- Frequency Range Input -->
            <div class="control-group">
                <label for="freqSlider">
                    <span>Base Frequency</span>
                    <span id="freqVal">55 Hz</span>
                </label>
                <input type="range" id="freqSlider" min="30" max="120" value="55" step="1">
            </div>

            <!-- Apartment Room Simulation (Reverb/Space) -->
            <div class="control-group">
                <label for="spaceSlider">
                    <span>Acoustic Space (Multi-room Sim)</span>
                    <span id="spaceVal">Medium</span>
                </label>
                <input type="range" id="spaceSlider" min="1" max="20" value="8" step="0.5">
            </div>
        </div>

        <button class="play-btn" id="playBtn">Start Aura</button>
    </div>

    <script>
        // --- Core Variables ---
        let synth, filter, reverb, chorus, lfo, loop;
        let isPlaying = false;
        let timeMultiplier = 1;
        let baseFrequency = 55;

        // UI Elements
        const playBtn = document.getElementById('playBtn');
        const moodSelect = document.getElementById('moodSelect');
        const freqSlider = document.getElementById('freqSlider');
        const freqVal = document.getElementById('freqVal');
        const spaceSlider = document.getElementById('spaceSlider');
        const spaceVal = document.getElementById('spaceVal');
        const timeDisplay = document.getElementById('timeDisplay');
        const vibeDisplay = document.getElementById('vibeDisplay');
        const aura = document.getElementById('aura');

        // --- Environmental Logic (Time Detection) ---
        function updateEnvironment() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes().toString().padStart(2, '0');
            timeDisplay.textContent = `Time: ${hours}:${minutes}`;

            let vibe = "";
            // Adjust generator multiplier based on time
            if (hours >= 5 && hours < 12) {
                vibe = "Morning Light";
                timeMultiplier = 1.2; // Brighter, slightly faster modulation
            } else if (hours >= 12 && hours < 18) {
                vibe = "Afternoon Flow";
                timeMultiplier = 1.0; // Balanced
            } else if (hours >= 18 && hours < 23) {
                vibe = "Evening Chill";
                timeMultiplier = 0.7; // Slower, deeper
            } else {
                vibe = "Deep Night";
                timeMultiplier = 0.4; // Very slow, sub-bass heavy
            }
            vibeDisplay.textContent = `Vibe: ${vibe}`;
        }

        // --- Audio Engine Setup (Web Audio API via Tone.js) ---
        async function initAudio() {
            await Tone.start();

            // 1. Spatial & Multi-room effects
            reverb = new Tone.Reverb({ decay: spaceSlider.value, wet: 0.6 }).toDestination();
            
            // 2. Filtering to keep bass smooth and avoid harsh highs
            filter = new Tone.Filter({ type: "lowpass", frequency: 150, rolloff: -24 }).connect(reverb);
            
            // 3. Chorus to widen the bass for "apartment-wide" feel
            chorus = new Tone.Chorus(4, 2.5, 0.5).connect(filter).start();

            // 4. Generative FMSynth for deep ambient textures
            synth = new Tone.FMSynth({
                harmonicity: 0.5,
                modulationIndex: 1.2,
                oscillator: { type: "sine" },
                modulation: { type: "triangle" },
                envelope: { attack: 3, decay: 2, sustain: 1, release: 6 }
            }).connect(chorus);

            // 5. LFO to slowly modulate the filter cutoff (Generative breath)
            lfo = new Tone.LFO(0.1, 40, 200).connect(filter.frequency).start();

            // 6. Generative Loop: Creates slow, evolving tonal shifts around the base frequency
            loop = new Tone.Loop((time) => {
                if(!isPlaying) return;
                // Procedural pitch drift (-3Hz to +3Hz)
                const drift = (Math.random() - 0.5) * 6; 
                synth.frequency.rampTo(baseFrequency + drift, 4, time);
            }, "2m");

            Tone.Transport.bpm.value = 40; // Very slow ambient tempo
            applyParameters();
        }

        // --- Parameter Adjustments ---
        function applyParameters() {
            if (!synth) return;

            baseFrequency = parseFloat(freqSlider.value);
            const mood = moodSelect.value;
            const space = parseFloat(spaceSlider.value);

            // Update spatial reverb
            reverb.decay = space;
            
            let lfoSpeed = 0.1;
            let filterMax = 150;
            let modIndex = 1.2;

            // Apply Mood logic
            switch(mood) {
                case "calm":
                    lfoSpeed = 0.05; filterMax = 120; modIndex = 1.0; break;
                case "focus":
                    lfoSpeed = 0.15; filterMax = 180; modIndex = 1.5; break;
                case "energetic":
                    lfoSpeed = 0.4;  filterMax = 300; modIndex = 3.0; break;
                case "sleep":
                    lfoSpeed = 0.02; filterMax = 80;  modIndex = 0.5; break;
            }

            // Combine Mood and Time multipliers
            lfo.frequency.rampTo(lfoSpeed * timeMultiplier, 1);
            lfo.min = baseFrequency - 10;
            lfo.max = filterMax;
            synth.modulationIndex.value = modIndex;

            if (isPlaying) {
                synth.frequency.rampTo(baseFrequency, 2);
            }
        }

        // --- Event Listeners ---
        freqSlider.addEventListener('input', (e) => {
            freqVal.textContent = `${e.target.value} Hz`;
            applyParameters();
        });

        spaceSlider.addEventListener('input', (e) => {
            let label = "Medium";
            if(e.target.value < 6) label = "Small Room";
            else if(e.target.value > 15) label = "Massive Hall";
            else label = "Whole Apartment";
            spaceVal.textContent = label;
            applyParameters();
        });

        moodSelect.addEventListener('change', applyParameters);

        playBtn.addEventListener('click', async () => {
            if (!synth) {
                await initAudio();
            }

            if (isPlaying) {
                // Stop Audio
                synth.triggerRelease();
                Tone.Transport.stop();
                loop.stop();
                playBtn.textContent = "Start Aura";
                playBtn.classList.remove('active');
                aura.classList.remove('playing');
                isPlaying = false;
            } else {
                // Play Audio
                await Tone.start();
                updateEnvironment();
                applyParameters();
                synth.triggerAttack(baseFrequency);
                Tone.Transport.start();
                loop.start(0);
                playBtn.textContent = "Stop Aura";
                playBtn.classList.add('active');
                aura.classList.add('playing');
                isPlaying = true;
            }
        });

        // Initialize Environment checks
        updateEnvironment();
        setInterval(updateEnvironment, 60000); // Check time every minute
    </script>
</body>
</html>
